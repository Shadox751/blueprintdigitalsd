<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <!-- Blue C swoosh -->
  <path d="M95 45 C25 45, 8 145, 78 205 C90 218, 100 224, 110 226"
        stroke="url(#blueGrad)" stroke-width="13" fill="none" stroke-linecap="round"/>
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a3a8a"/>
      <stop offset="100%" stop-color="#3366ff"/>
    </linearGradient>
  </defs>

  <!-- Script A -->
  <text x="100" y="195" font-family="'Georgia', 'Times New Roman', serif" font-size="185"
        font-style="italic" font-weight="400" fill="#ffffff" letter-spacing="-5">A</text>

  <!-- -LIST -->
  <text x="208" y="168" font-family="'Arial Black', 'Helvetica', sans-serif" font-size="74"
        font-weight="900" fill="#ffffff" letter-spacing="2">-LIST</text>

  <!-- BARBERSHOP -->
  <text x="200" y="240" font-family="'Arial Black', 'Helvetica', sans-serif" font-size="38"
        font-weight="900" fill="#ffffff" letter-spacing="10" text-anchor="middle">BARBERSHOP</text>
</svg>